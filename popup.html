<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="step-label">Paso 02</div>
    <h1>Configura el analisis</h1>
    <p style="font-size: 0.8rem; color: #657786;">La extensión usará tu sesión activa de X para limpiar tu rastro.</p>

    <div class="card">
        <label>Archivo tweets.js</label>
        <input type="file" id="fileInput" accept=".js,.json">
    </div>

    <div class="card">
        <label>Palabra específica</label>
        <input type="text" id="palabraBuscada">
    </div>

    <div class="card">
        <label>Categorías IA</label>
        <div class="checkbox-grid">
            <label class="checkbox-item"><input type="checkbox" name="temas" value="Racismo"><span>Racismo</span></label>
            <label class="checkbox-item"><input type="checkbox" name="temas" value="Machismo"><span>Machismo</span></label>
            <label class="checkbox-item"><input type="checkbox" name="temas" value="Insultos"><span>Insultos</span></label>
            <label class="checkbox-item"><input type="checkbox" name="temas" value="Odio"><span>Odio</span></label>
        </div>
    </div>

    <button id="btnStart" class="btn-primary">Iniciar Escaneo e Inyección</button>
    <div id="log"></div>

    <script src="popup.js"></script>
</body>
</html>
