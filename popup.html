<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <span class="step-label">Paso 02</span>
    <h1>Configura el análisis</h1>

    <div class="card">
        <label>Archivo tweets.js</label>
        <input type="file" id="fileInput">
    </div>

    <div class="card">
        <label>Palabra específica (Opcional)</label>
        <input type="text" id="palabraBuscada" placeholder="Ej: insulto, política...">
    </div>

    <div class="card">
        <label>Categorías IA</label>
        <div class="checkbox-grid">
            <label class="checkbox-item"><input type="checkbox" name="temas" value="Racismo"><span>Racismo</span></label>
            <label class="checkbox-item"><input type="checkbox" name="temas" value="Machismo"><span>Machismo</span></label>
            <label class="checkbox-item"><input type="checkbox" name="temas" value="Islamofobia"><span>Islamofobia</span></label>
            <label class="checkbox-item"><input type="checkbox" name="temas" value="Homofobia"><span>Homofobia</span></label>
        </div>
    </div>

    <button id="btnStart" class="btn-primary">Iniciar Limpieza</button>

    <div id="log">ESPERANDO ACCIÓN...</div>

    <script src="popup.js"></script>
</body>
</html>
